version: '3.8'

services:
  postgres:
    image: ankane/pgvector:latest
    container_name: secretaria-postgres
    environment:
      POSTGRES_USER: secretaria
      POSTGRES_PASSWORD: secretaria_dev
      POSTGRES_DB: secretaria
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U secretaria"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: secretaria-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
